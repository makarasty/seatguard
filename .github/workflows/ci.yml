name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Build, vet, unit-test AND run the full §6 acceptance harness on each OS.
  # The harness exercises the host's platform backend end-to-end, so this is
  # what actually validates the Linux and macOS detection paths at runtime.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # All three backends (Linux /proc, Windows syscalls, macOS proc_info(2)) are
    # validated end-to-end by the harness below and gate CI equally. fail-fast
    # is off so one target's failure still lets the others report.
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Vet
        run: go vet ./...
      - name: Unit tests
        run: go test ./core/...
      # macOS only wires up 127.0.0.1 by default; the harness's stub Anthropic
      # endpoint lives on a dedicated loopback alias, so add it there.
      - name: Add loopback alias (macOS)
        if: runner.os == 'macOS'
        run: sudo ifconfig lo0 alias 127.209.31.7 up
      - name: Acceptance harness (§6)
        run: go run ./cmd/harness

  # Produce static release binaries for all three targets.
  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, ext: "" }
          - { goos: darwin, goarch: arm64, ext: "" }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build
        run: go build -trimpath -ldflags "-s -w" -o dist/seatguard-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/seatguard
      - uses: actions/upload-artifact@v4
        with:
          name: seatguard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  # Publish binaries only after every test (all 3 OS) AND build target passed.
  # Runs on pushes to main (rolling 'latest' prerelease) and on vX.Y.Z tag
  # pushes (permanent versioned release). Never on PRs or forks.
  release:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write # create releases/tags; scoped to this job only
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false # serialize so the rolling tag never races
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true # flatten all per-target artifacts into dist/
      - name: Checksums
        working-directory: dist
        run: |
          sha256sum seatguard-* | tee SHA256SUMS
      # Rolling prerelease: overwrite the single 'latest' release (and retarget
      # its tag) with the freshest green main build. Delete-then-create avoids
      # stale assets piling up. '|| true' covers the first run (nothing to delete).
      - name: Publish rolling 'latest' (main)
        if: github.ref == 'refs/heads/main'
        run: |
          sha="${GITHUB_SHA::7}"
          gh release delete latest --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          gh release create latest dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "latest ($sha)" \
            --prerelease \
            --notes "Rolling build from \`main\` @ \`$sha\`, auto-published after the §6 acceptance harness passed on Linux, Windows and macOS. For a pinned build, use a versioned \`vX.Y.Z\` release. Verify downloads against \`SHA256SUMS\`."
      # Permanent release for an explicit semver tag, also gated on green tests.
      - name: Publish versioned release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "seatguard $GITHUB_REF_NAME — static, CGO-free binaries for linux/amd64, darwin/arm64, windows/amd64. All §6 acceptance checks green on all three OSes. Verify downloads against \`SHA256SUMS\`."
